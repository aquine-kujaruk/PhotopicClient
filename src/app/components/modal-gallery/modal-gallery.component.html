<ion-content fullscreen>
	<ion-item class="close-fake ion-text-center" lines="none">
		<ion-button (click)="discardModal()" fill="clear">
			<ion-icon slot="start" name="close"></ion-icon>
			Back
		</ion-button>

		<ion-button (click)="zoom(true)" fill="clear">
			<ion-icon slot="start" name="add"></ion-icon>
			in
		</ion-button>

		<ion-button (click)="zoom(false)" fill="clear">
			<ion-icon slot="start" name="remove"></ion-icon>
			out
		</ion-button>
	</ion-item>

	<ion-slides [options]="sliderOpts" #slider>
		<ion-slide>
			<div class="swiper-zoom-container">
				<img [src]="photo.img" />
			</div>
		</ion-slide>
	</ion-slides>
</ion-content>
