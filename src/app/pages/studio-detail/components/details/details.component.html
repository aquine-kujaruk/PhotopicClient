<ion-grid class="ion-padding">
	<ion-row #imageContainer>
		<div
			class="image-fit"
			[style.height.px]="setImageHeight(imageContainer)"
			[style.backgroundImage]="
				_mapboxService.staticImage(studio.coordinates) | imageUrlToBase64 | async
			"
			tappable
			(click)="_mapboxService.openInGoogleMaps(studio.coordinates)"
		></div>
	</ion-row>
</ion-grid>
