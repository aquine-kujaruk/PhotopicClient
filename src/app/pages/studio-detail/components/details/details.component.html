<ion-grid class="ion-padding">
	<ion-row #imageContainer>
		<div
			class="image-fit"
			[style.height.px]="setImageHeight(imageContainer)"
			[style.backgroundImage]="
				_mapboxService.staticImage(studio.coordinates) | imageUrlToBase64 | async
			"
			tappable
			(click)="_mapboxService.openInGoogleMaps(studio.coordinates)"
		></div>
	</ion-row>
</ion-grid>

<ion-list>
	<ion-item lines="none">
		<ion-label class="ion-text-wrap">{{ studio.address }}</ion-label>
	</ion-item>

	<ion-item lines="none" tappable (click)="_externalLinksService.openLink(studio.webpage)">
		<ion-icon slot="start" name="globe"></ion-icon>
		<ion-label>Página web</ion-label>
	</ion-item>

	<ion-item
		lines="none"
		tappable
		(click)="_externalLinksService.openLink(studio.instagramProfile)"
		class="instagram-color"
	>
		<ion-icon slot="start" name="logo-instagram"></ion-icon>
		<ion-label>Perfil de instagram</ion-label>
	</ion-item>

	<ion-item
		lines="none"
		tappable
		(click)="_externalLinksService.openLink(studio.facebookProfile)"
		class="facebook-color"
	>
		<ion-icon slot="start" name="logo-facebook"></ion-icon>
		<ion-label>Perfil de facebook</ion-label>
	</ion-item>

	<ion-item lines="none" tappable>
		<ion-icon slot="start" name="mail"></ion-icon>
		<ion-label>E-mail</ion-label>
	</ion-item>

	<ion-item lines="none" tappable class="whatsapp-color">
		<ion-icon slot="start" name="logo-whatsapp"></ion-icon>
		<ion-label>+593984003182</ion-label>
	</ion-item>

	<ion-item lines="none" tappable>
		<ion-icon slot="start" name="call"></ion-icon>
		<ion-label>+593984003182</ion-label>
	</ion-item>
</ion-list>
