<ion-content class="first-color">
	<ion-header no-border>
		<ion-toolbar>
			<ion-buttons slot="end" tappable (click)="discardModal()">
				<ion-title color="text-soft">Descartar</ion-title>
			</ion-buttons>
		</ion-toolbar>
	</ion-header>

	<ion-grid fixed>
		<!-- <ion-row>
            <ion-col>
                <h2 class="ion-text-center"> {{nombre}} -- {{apellidos}} </h2>
            </ion-col>
        </ion-row> -->

		<ion-row>
			<ion-col size="12" class="text-title ion-padding">
				<h3>Ciudad</h3>
			</ion-col>
			<ion-col size="12">
				<ion-searchbar
					class="app-searchbar"
					showCancelButton="focus"
					placeholder="{{ 'HOME.SEARCHBAR.PLACEHOLDER' | translate }}"
					color="background-medium"
					(ionChange)="onSearchChange($event)"
					[debounce]="250"
					[value]="selectedAddress"
					animated
				>
				</ion-searchbar>

				<div class="address-container">
					<ion-list *ngIf="addresses.length > 0">
						<ion-item
							lines="none"
							button
							*ngFor="let address of addresses"
							tappable
							(click)="onSelect(address)"
							style="cursor: pointer;"
						>
							<ion-icon slot="start" name="pin"></ion-icon>
							<ion-label>{{ address.place_name }}</ion-label>
						</ion-item>
					</ion-list>
				</div>
			</ion-col>
		</ion-row>

		<div id="map"></div>

		<!-- <ion-row>
            <ion-col size="12" padding class="text-title">
                <h3>Rating</h3>
            </ion-col>
            <ion-col size="12">
                
        </ion-col>
        </ion-row> -->

		<ion-row class="ion-align-items-end">
			<ion-col>
				<ion-button
					shape="round"
					class="round"
					color="text-medium"
					expand="full"
					tappable
					(click)="setFilters()"
				>
					Filtrar
				</ion-button>
			</ion-col>
		</ion-row>
	</ion-grid>
</ion-content>
